    cmd: "npm --prefix frontend exec -- eslint src/components/dialog src/components/Header src/components/CommandPresetManager src/services/api.ts src/types tests/unit/dialogGeometry.test.ts tests/unit/commandPresetExecution.test.ts tests/e2e/command-management-dialog.spec.ts"
