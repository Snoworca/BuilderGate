    cmd: "node --experimental-strip-types --test frontend/tests/unit/dialogGeometry.test.ts frontend/tests/unit/commandPresetExecution.test.ts"
    expected_exit: 0
  - shell: "pwsh"
    cmd: "npm --prefix frontend run build"
    expected_exit: 0
  - shell: "pwsh"
    cmd: "npm --prefix server run test"
    expected_exit: 0
  - shell: "pwsh"
    cmd: "npm --prefix frontend exec -- playwright test tests/e2e/command-management-dialog.spec.ts --project \"Desktop Chrome\""
    expected_exit: 0
forbidden_patterns:
